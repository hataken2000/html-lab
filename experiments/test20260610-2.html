<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>水槽シミュレーション</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050510;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      user-select: none;
      overflow: hidden;
    }
    h1 { font-size: 13px; margin-bottom: 6px; color: #3a8eff; letter-spacing: 4px; }
    #wrap { position: relative; }
    #tank-frame {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      border: 3px solid rgba(60,140,255,0.5);
      border-top: none;
      pointer-events: none;
      box-shadow: inset 0 0 60px rgba(60,140,255,0.04), 0 0 30px rgba(60,140,255,0.15);
    }
    canvas { display: block; }
    #panel {
      position: absolute; top: 8px; right: 8px;
      display: flex; flex-direction: column; gap: 5px; align-items: flex-end;
    }
    .row { display: flex; align-items: center; gap: 5px; }
    label { font-size: 10px; color: #666; }
    input[type=color] {
      width: 34px; height: 22px; border: 1px solid #333; border-radius: 3px;
      cursor: pointer; background: none; padding: 1px;
    }
    button {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: #999; padding: 3px 9px; border-radius: 3px; cursor: pointer;
      font-size: 10px; font-family: monospace; transition: all 0.15s;
    }
    button:hover { background: rgba(255,255,255,0.14); color: #ddd; }
    button.on { border-color: #4af; color: #4af; background: rgba(0,180,255,0.1); }
    #hint {
      margin-top: 6px; font-size: 10px; color: #444; text-align: center; line-height: 1.6;
    }
    #stats {
      position: absolute; bottom: 5px; left: 7px;
      font-size: 9px; color: rgba(255,255,255,0.18);
    }
  </style>
</head>
<body>
  <h1>◈ WATER TANK ◈</h1>
  <div id="wrap">
    <canvas id="c"></canvas>
    <div id="tank-frame"></div>
    <div id="panel">
      <div class="row"><label>水色</label><input type="color" id="clr" value="#3a8eff"></div>
      <button id="btnDrain">🚰 排水</button>
      <button id="btnFreeze">❄ 凍結</button>
      <button id="btnBubble">🫧 泡モード</button>
      <button id="btnGrav">🔄 重力反転</button>
      <button id="btnTide">🌊 波モード</button>
    </div>
    <div id="stats"></div>
  </div>
  <div id="hint">
    クリック/ドラッグ → 注水 ｜ ドラッグでかき混ぜ ｜ キーボード → 文字を投入<br>
    ❄凍結で一時停止 ｜ 🔄重力反転 ｜ 🫧泡モード ｜ 🌊波モード
  </div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 760, H = 500;
canvas.width  = W;
canvas.height = H;

// ─── パラメータ ──────────────────────────────
const RADIUS    = 5.5;
const SEP       = RADIUS * 2.45;
const GRAVITY   = 0.17;
const DAMPING   = 0.987;
const WALL_D    = 0.22;
const PRESSURE  = 0.34;
const STIR_R    = 72;
const MAX_P     = 5000;

// ─── パーティクルバッファ ─────────────────────
const px   = new Float32Array(MAX_P);
const py   = new Float32Array(MAX_P);
const pvx  = new Float32Array(MAX_P);
const pvy  = new Float32Array(MAX_P);
const pR   = new Uint8Array(MAX_P);
const pG   = new Uint8Array(MAX_P);
const pB   = new Uint8Array(MAX_P);
const pTyp = new Uint8Array(MAX_P); // 0=water 1=bubble
let numP = 0;

// ─── グリッド ────────────────────────────────
const CELL  = Math.ceil(SEP);
const GCOLS = Math.ceil(W / CELL) + 2;
const GROWS = Math.ceil(H / CELL) + 2;
const grid  = Array.from({length: GCOLS * GROWS}, () => []);

// ─── ステート ────────────────────────────────
const mouse = { x: 0, y: 0, px: 0, py: 0, down: false };
let color      = { r: 58, g: 142, b: 255 };
let frozen     = false;
let bubbleMode = false;
let gravInv    = false;
let tideMode   = false;
let frame      = 0;
let waterLevel = H;

// ─── 文字オブジェクト ─────────────────────────
class LetterObj {
  constructor(ch) {
    this.ch   = ch;
    this.x    = 60 + Math.random() * (W - 120);
    this.y    = Math.min(waterLevel - 10, H * 0.4);
    this.vx   = (Math.random() - 0.5) * 4;
    this.vy   = (Math.random() - 0.5) * 2 - 1;
    this.ang  = (Math.random() - 0.5) * 0.5;
    this.va   = (Math.random() - 0.5) * 0.08;
    this.sz   = 22 + (Math.random() * 20 | 0);
    this.col  = `hsl(${Math.random()*360|0},80%,67%)`;
    // 各文字固有の浮力 (0.2=重い … 1.1=軽い)
    this.buoy = 0.2 + Math.random() * 0.9;
    this.hw   = this.sz * 0.48;
    this.hh   = this.sz * 0.58;
  }
  update() {
    const g = gravInv ? -GRAVITY : GRAVITY;
    this.vy += g;
    // 水中判定と浮力
    const sub = Math.max(0, Math.min(1, (waterLevel - this.y) / (this.hh * 2) + 0.5));
    if (sub > 0) {
      this.vy  -= this.buoy * sub * Math.abs(g) * 2.8;
      this.vx  *= 0.96;
      this.vy  *= 0.96;
      this.va  *= 0.96;
    }
    this.x   += this.vx;
    this.y   += this.vy;
    this.ang += this.va;
    // 壁
    if (this.x - this.hw < 0)   { this.x  = this.hw;   this.vx =  Math.abs(this.vx)*0.45; }
    if (this.x + this.hw > W)   { this.x  = W-this.hw; this.vx = -Math.abs(this.vx)*0.45; }
    if (this.y + this.hh > H)   { this.y  = H-this.hh; this.vy = -Math.abs(this.vy)*0.3;  this.va *= 0.8; }
    if (this.y - this.hh < 0)   { this.y  = this.hh;   this.vy =  Math.abs(this.vy)*0.3; }
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.ang);
    ctx.font         = `bold ${this.sz}px monospace`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor  = this.col;
    ctx.shadowBlur   = 14;
    ctx.fillStyle    = this.col;
    ctx.fillText(this.ch, 0, 0);
    ctx.restore();
  }
}
const letters = [];

// ─── ヘルパー ────────────────────────────────
function hexToRgb(hex) {
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
}

function addParticle(x, y, vx, vy, r, g, b, type=0) {
  if (numP >= MAX_P) return;
  const i = numP++;
  px[i]=x; py[i]=y; pvx[i]=vx; pvy[i]=vy;
  pR[i]=r; pG[i]=g; pB[i]=b; pTyp[i]=type;
}

function removeAt(i) {
  numP--;
  if (i < numP) {
    px[i]=px[numP]; py[i]=py[numP]; pvx[i]=pvx[numP]; pvy[i]=pvy[numP];
    pR[i]=pR[numP]; pG[i]=pG[numP]; pB[i]=pB[numP]; pTyp[i]=pTyp[numP];
  }
}

function calcWaterLevel() {
  if (numP === 0) { waterLevel = H; return; }
  let minY = H;
  for (let i = 0; i < numP; i++) {
    if (pTyp[i] === 0 && py[i] - RADIUS < minY) minY = py[i] - RADIUS;
  }
  waterLevel = minY;
}

// ─── 更新 ────────────────────────────────────
function update() {
  if (frozen) return;
  frame++;

  // グリッドクリア
  for (let c of grid) c.length = 0;
  for (let i = 0; i < numP; i++) {
    const gx = Math.max(0, Math.min(GCOLS-1, (px[i]/CELL)|0));
    const gy = Math.max(0, Math.min(GROWS-1, (py[i]/CELL)|0));
    grid[gy*GCOLS+gx].push(i);
  }

  const g0 = gravInv ? -GRAVITY : GRAVITY;
  // 波モード用横流れ
  const tideX = tideMode ? Math.sin(frame * 0.025) * 0.08 : 0;

  for (let i = 0; i < numP; i++) {
    const isBubble = pTyp[i] === 1;
    let fx = tideX, fy = isBubble ? -Math.abs(g0)*0.55 : g0;
    if (isBubble) fx += Math.sin(frame*0.06 + i*2.1) * 0.06;

    // 近傍反発
    const gx0 = Math.max(0, (px[i]/CELL)|0 - 1);
    const gy0 = Math.max(0, (py[i]/CELL)|0 - 1);
    const gx1 = Math.min(GCOLS-1, gx0+2);
    const gy1 = Math.min(GROWS-1, gy0+2);
    for (let gy=gy0; gy<=gy1; gy++) {
      for (let gx=gx0; gx<=gx1; gx++) {
        const cell = grid[gy*GCOLS+gx];
        for (let k=0; k<cell.length; k++) {
          const j = cell[k];
          if (j===i) continue;
          const dx=px[i]-px[j], dy=py[i]-py[j];
          const d2=dx*dx+dy*dy;
          if (d2<SEP*SEP && d2>0.001) {
            const d=Math.sqrt(d2), f=(SEP-d)/SEP*PRESSURE;
            fx+=dx/d*f; fy+=dy/d*f;
          }
        }
      }
    }

    // マウスかき混ぜ
    if (mouse.down) {
      const mdx=px[i]-mouse.x, mdy=py[i]-mouse.y;
      const md2=mdx*mdx+mdy*mdy;
      if (md2<STIR_R*STIR_R && md2>0.01) {
        const inf=1-Math.sqrt(md2)/STIR_R;
        pvx[i]+=(mouse.x-mouse.px)*inf*0.28;
        pvy[i]+=(mouse.y-mouse.py)*inf*0.28;
      }
    }

    pvx[i]=(pvx[i]+fx)*DAMPING;
    pvy[i]=(pvy[i]+fy)*DAMPING;
    px[i]+=pvx[i]; py[i]+=pvy[i];

    // 壁
    if (px[i]<RADIUS)   { px[i]=RADIUS;   pvx[i]*=-WALL_D; }
    if (px[i]>W-RADIUS) { px[i]=W-RADIUS; pvx[i]*=-WALL_D; }
    if (py[i]<RADIUS)   { py[i]=RADIUS;   pvy[i]*=-WALL_D; }
    if (py[i]>H-RADIUS) { py[i]=H-RADIUS; pvy[i]*=-WALL_D; }

    // バブル消滅（上端付近）
    if (isBubble && py[i] < RADIUS*4) {
      removeAt(i); i--; continue;
    }
  }

  // 注水 / 泡
  if (mouse.down && frame%2===0) {
    if (bubbleMode) {
      addParticle(
        mouse.x+(Math.random()-.5)*10, mouse.y+(Math.random()-.5)*10,
        (Math.random()-.5)*1.5, -Math.random()*2.5,
        210,235,255, 1
      );
    } else {
      for (let k=0;k<4;k++) {
        addParticle(
          mouse.x+(Math.random()-.5)*14, mouse.y+(Math.random()-.5)*14,
          (Math.random()-.5)*2.5, (Math.random()-.5)*2,
          color.r,color.g,color.b, 0
        );
      }
    }
  }

  calcWaterLevel();
  for (const l of letters) l.update();

  mouse.px=mouse.x; mouse.py=mouse.y;
}

// ─── 描画 ────────────────────────────────────
function draw() {
  // 背景
  ctx.fillStyle='#06061c';
  ctx.fillRect(0,0,W,H);

  // グリッド
  ctx.strokeStyle='rgba(255,255,255,0.022)';
  ctx.lineWidth=1;
  for (let x=0;x<W;x+=48) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0;y<H;y+=48) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // 水体（グラデ塗り）
  if (numP>0) {
    const wl = waterLevel;
    const grd = ctx.createLinearGradient(0,wl,0,H);
    grd.addColorStop(0,  `rgba(${color.r},${color.g},${color.b},0.07)`);
    grd.addColorStop(0.4,`rgba(${color.r},${color.g},${color.b},0.13)`);
    grd.addColorStop(1,  `rgba(${color.r*0.35|0},${color.g*0.35|0},${color.b*0.5|0},0.22)`);
    ctx.fillStyle=grd;
    ctx.fillRect(0,wl,W,H-wl);

    // 水面波線
    ctx.beginPath();
    ctx.moveTo(0, wl);
    for (let x=0;x<=W;x+=6) {
      const y = wl
        + Math.sin(x*0.055 + frame*0.05) * 2.2
        + Math.sin(x*0.028 - frame*0.033) * 1.6
        + (tideMode ? Math.sin(x*0.01 + frame*0.02)*4 : 0);
      x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.strokeStyle=`rgba(${color.r},${color.g},${color.b},0.55)`;
    ctx.lineWidth=1.8;
    ctx.stroke();

    // 水面ハイライト
    ctx.beginPath();
    for (let x=0;x<=W;x+=6) {
      const y = wl
        + Math.sin(x*0.055 + frame*0.05) * 2.2
        + Math.sin(x*0.028 - frame*0.033) * 1.6
        + (tideMode ? Math.sin(x*0.01 + frame*0.02)*4 : 0) - 1;
      x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.strokeStyle=`rgba(255,255,255,0.12)`;
    ctx.lineWidth=1;
    ctx.stroke();
  }

  // パーティクル
  for (let i=0;i<numP;i++) {
    const x=px[i], y=py[i];
    if (pTyp[i]===1) {
      // バブル
      const r2=RADIUS+1.5;
      ctx.beginPath();
      ctx.arc(x,y,r2,0,Math.PI*2);
      ctx.strokeStyle='rgba(190,225,255,0.55)';
      ctx.lineWidth=1;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(x-r2*0.35,y-r2*0.35,r2*0.28,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.75)';
      ctx.fill();
    } else {
      const df = 0.45 + 0.55*(y/H);
      const r=pR[i]*df|0, g_=pG[i]*df|0, b=Math.min(255,pB[i]*0.9+20)|0;
      const grad=ctx.createRadialGradient(x-RADIUS*0.38,y-RADIUS*0.38,0.4,x,y,RADIUS);
      grad.addColorStop(0,`rgba(${Math.min(255,r+90)},${Math.min(255,g_+80)},${Math.min(255,b+55)},0.8)`);
      grad.addColorStop(1,`rgba(${r},${g_},${b},0.65)`);
      ctx.beginPath();
      ctx.arc(x,y,RADIUS,0,Math.PI*2);
      ctx.fillStyle=grad;
      ctx.fill();
    }
  }

  // マウスオーバーレイ
  if (mouse.down) {
    ctx.beginPath();
    ctx.arc(mouse.x,mouse.y,STIR_R,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.05)';
    ctx.lineWidth=1; ctx.stroke();
    ctx.beginPath();
    ctx.arc(mouse.x,mouse.y,9,0,Math.PI*2);
    ctx.fillStyle=`rgba(${color.r},${color.g},${color.b},0.5)`;
    ctx.fill();
  }

  // 文字
  for (const l of letters) l.draw();

  // Stats
  document.getElementById('stats').textContent=`💧 ${numP}/${MAX_P}  |  文字 ${letters.length}`;
}

// ─── イベント ────────────────────────────────
canvas.addEventListener('mousedown', e => {
  const r=canvas.getBoundingClientRect();
  mouse.down=true;
  mouse.x=mouse.px=e.clientX-r.left;
  mouse.y=mouse.py=e.clientY-r.top;
});
canvas.addEventListener('mousemove', e => {
  const r=canvas.getBoundingClientRect();
  mouse.px=mouse.x; mouse.py=mouse.y;
  mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top;
});
canvas.addEventListener('mouseup',    ()=>{ mouse.down=false; });
canvas.addEventListener('mouseleave', ()=>{ mouse.down=false; });

// タッチ対応
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect(), t=e.touches[0];
  mouse.down=true;
  mouse.x=mouse.px=t.clientX-r.left;
  mouse.y=mouse.py=t.clientY-r.top;
}, {passive:false});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect(), t=e.touches[0];
  mouse.px=mouse.x; mouse.py=mouse.y;
  mouse.x=t.clientX-r.left; mouse.y=t.clientY-r.top;
}, {passive:false});
canvas.addEventListener('touchend', ()=>{ mouse.down=false; });

document.addEventListener('keydown', e => {
  if (e.key.length===1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
    letters.push(new LetterObj(e.key));
    // 入水スプラッシュ
    for (let k=0;k<8;k++) {
      addParticle(
        letters.at(-1).x + (Math.random()-.5)*40,
        waterLevel + 5,
        (Math.random()-.5)*6, -Math.random()*5,
        color.r, color.g, color.b, 0
      );
    }
  }
});

document.getElementById('clr').addEventListener('input', e => { color=hexToRgb(e.target.value); });

document.getElementById('btnDrain').addEventListener('click', ()=>{
  numP=0; letters.length=0;
});
document.getElementById('btnFreeze').addEventListener('click', e=>{
  frozen=!frozen;
  e.target.classList.toggle('on',frozen);
  e.target.textContent=frozen?'▶ 解凍':'❄ 凍結';
});
document.getElementById('btnBubble').addEventListener('click', e=>{
  bubbleMode=!bubbleMode;
  e.target.classList.toggle('on',bubbleMode);
});
document.getElementById('btnGrav').addEventListener('click', e=>{
  gravInv=!gravInv;
  e.target.classList.toggle('on',gravInv);
});
document.getElementById('btnTide').addEventListener('click', e=>{
  tideMode=!tideMode;
  e.target.classList.toggle('on',tideMode);
});

// ─── メインループ ────────────────────────────
(function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
