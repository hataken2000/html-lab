<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水槽シミュレーター</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
    }
    canvas { display: block; cursor: crosshair; }
    a.back {
      position: fixed;
      top: 1rem; left: 1rem;
      color: #555;
      text-decoration: none;
      font-size: 0.85rem;
      z-index: 10;
    }
    a.back:hover { color: #aaa; }
    #ui {
      position: fixed;
      top: 1rem; right: 1rem;
      background: rgba(20,20,20,0.85);
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 0.8rem 1rem;
      font-size: 0.75rem;
      color: #999;
      z-index: 10;
      line-height: 1.7;
      max-width: 230px;
    }
    #ui b { color: #fff; }
    #particle-slider, #size-slider {
      width: 100%;
      margin: 4px 0 2px;
      accent-color: #4fc3f7;
    }
    #colors {
      display: flex;
      gap: 6px;
      margin: 6px 0;
      flex-wrap: wrap;
    }
    .swatch {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
    }
    .swatch.active { border-color: #fff; }
    #materials {
      display: flex;
      gap: 4px;
      margin: 6px 0;
      flex-wrap: wrap;
    }
    .mat-btn {
      background: #2a2a2a;
      border: 1px solid transparent;
      border-radius: 6px;
      color: #ccc;
      font-size: 0.72rem;
      padding: 3px 8px;
      cursor: pointer;
    }
    .mat-btn.active { border-color: #fff; background: #3a3a3a; color: #fff; }
    #stats {
      position: fixed;
      bottom: 1rem; left: 1rem;
      font-size: 0.7rem;
      color: #555;
      z-index: 10;
    }
  </style>
</head>
<body>
  <a class="back" href="../index.html">← 一覧に戻る</a>

  <div id="ui">
    <b>🌊 水槽シミュレーター</b><br>
    クリック/ホールド：素材を注ぐ・置く<br>
    ドラッグ：かき混ぜる（壁・消すはドラッグで連続配置）<br>
    キー入力：文字が落ちる（浮力は文字ごと）<br>
    <div id="materials"></div>
    <div id="colors"></div>
    パーティクル上限：<span id="particle-val">2500</span><br>
    <input id="particle-slider" type="range" min="100" max="10000" step="100" value="2500"><br>
    粒の大きさ：<span id="size-val">6</span><br>
    <input id="size-slider" type="range" min="2" max="20" step="1" value="6"><br>
    <b>Tab</b>：排水栓 開/閉　<b>Space</b>：シェイク<br>
    <b>↑</b>：重力反転　<b>Delete</b>：全消去
  </div>

  <div id="stats"></div>
  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() {
      W = canvas.width = innerWidth;
      H = canvas.height = innerHeight;
    }
    resize();
    addEventListener('resize', resize);

    // ===== 設定 =====
    let R = 6;               // パーティクル半径
    let H_SMOOTH = R * 3;   // 相互作用半径
    const STIFF = 0.35;      // 圧力の強さ
    const STIFF_NEAR = 0.6;
    const REST = 2.2;        // 静止密度
    let GRAVITY = 0.18;
    const COLORS = ['#4fc3f7', '#ef5350', '#66bb6a', '#ffca28', '#ab47bc', '#ff7043', '#26c6da', '#ec407a'];

    // ===== 状態 =====
    let particles = [];   // {x,y,px,py,vx,vy,color}
    let letters = [];     // {ch,x,y,vx,vy,angle,va,buoy,size}
    let mouse = { x: 0, y: 0, px: 0, py: 0, down: false };
    let currentColor = COLORS[0];
    let drainOpen = false;
    let MAX_PARTICLES = 2500;
    let gravityFlip = false;

    // ===== 素材定義 =====
    // gScale: 重さ（重力倍率）, visc: 粘性（速度減衰）, w: 押されやすさ（0=不動）
    const MATS = {
      water: { label: '🌊 水',   gScale: 1.0, visc: 0.99, w: 1.0,  fluid: true },
      oil:   { label: '🛢️ 油',   gScale: 0.55, visc: 0.92, w: 1.35, fluid: true,  color: '#c8a832' },
      sand:  { label: '🏖️ 砂',   gScale: 1.7, visc: 0.75, w: 0.6,  fluid: false, color: '#d4b483' },
      wall:  { label: '🧱 壁',   gScale: 0,   visc: 0,    w: 0,    fluid: false, color: '#8a8a8a' },
      erase: { label: '🧹 消す' }
    };
    let currentMat = 'water';

    // 素材ボタンUI
    const matsDiv = document.getElementById('materials');
    for (const key of Object.keys(MATS)) {
      const b = document.createElement('button');
      b.className = 'mat-btn' + (key === currentMat ? ' active' : '');
      b.textContent = MATS[key].label;
      b.onclick = () => {
        currentMat = key;
        document.querySelectorAll('.mat-btn').forEach(el => el.classList.remove('active'));
        b.classList.add('active');
      };
      matsDiv.appendChild(b);
    }

    // 色パレットUI
    const colorsDiv = document.getElementById('colors');
    COLORS.forEach((c, i) => {
      const s = document.createElement('div');
      s.className = 'swatch' + (i === 0 ? ' active' : '');
      s.style.background = c;
      s.onclick = () => {
        currentColor = c;
        document.querySelectorAll('.swatch').forEach(el => el.classList.remove('active'));
        s.classList.add('active');
      };
      colorsDiv.appendChild(s);
    });

    // スライダー
    const sizeSlider = document.getElementById('size-slider');
    const sizeVal = document.getElementById('size-val');
    sizeSlider.addEventListener('input', () => {
      R = parseInt(sizeSlider.value);
      H_SMOOTH = R * 3;
      sizeVal.textContent = R;
    });

    const slider = document.getElementById('particle-slider');
    const sliderVal = document.getElementById('particle-val');
    slider.addEventListener('input', () => {
      MAX_PARTICLES = parseInt(slider.value);
      sliderVal.textContent = MAX_PARTICLES;
      // 超過分を削除
      if (particles.length > MAX_PARTICLES) particles.splice(MAX_PARTICLES);
    });

    // ===== 空間ハッシュ =====
    let grid = new Map();
    function gridKey(gx, gy) { return gx * 100000 + gy; }
    function buildGrid() {
      grid.clear();
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        const k = gridKey(Math.floor(p.x / H_SMOOTH), Math.floor(p.y / H_SMOOTH));
        let arr = grid.get(k);
        if (!arr) { arr = []; grid.set(k, arr); }
        arr.push(i);
      }
    }
    function neighbors(x, y) {
      const gx = Math.floor(x / H_SMOOTH), gy = Math.floor(y / H_SMOOTH);
      const out = [];
      for (let dx = -1; dx <= 1; dx++)
        for (let dy = -1; dy <= 1; dy++) {
          const arr = grid.get(gridKey(gx + dx, gy + dy));
          if (arr) out.push(...arr);
        }
      return out;
    }

    // ===== 注ぐ・置く・消す =====
    function pour(x, y) {
      if (currentMat === 'erase') {
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          if (Math.hypot(p.x - x, p.y - y) < 40) particles.splice(i, 1);
        }
        return;
      }
      if (particles.length >= MAX_PARTICLES) return;
      const mat = MATS[currentMat];
      if (currentMat === 'wall') {
        // 壁はグリッドに沿って固定配置（近くに既存の壁があればスキップ）
        const gx = Math.round(x / (R * 1.6)) * (R * 1.6);
        const gy = Math.round(y / (R * 1.6)) * (R * 1.6);
        for (const p of particles) {
          if (p.mat === 'wall' && Math.hypot(p.x - gx, p.y - gy) < R * 1.2) return;
        }
        particles.push({ x: gx, y: gy, px: gx, py: gy, vx: 0, vy: 0, mat: 'wall', color: mat.color });
        return;
      }
      for (let i = 0; i < 4; i++) {
        particles.push({
          x: x + (Math.random() - 0.5) * 12,
          y: y + (Math.random() - 0.5) * 12,
          px: x, py: y,
          vx: (Math.random() - 0.5) * 2,
          vy: Math.random() * 2,
          mat: currentMat,
          color: mat.color || currentColor
        });
      }
    }

    // ===== 文字生成 =====
    function spawnLetter(ch) {
      const code = ch.codePointAt(0);
      // 文字コードからサインカーブで浮力係数を決定（文字ごとに固定）
      const t = (code * 0.61803) % 1;
      const buoy = 0.5 + Math.sin(t * Math.PI * 2) * 0.45 + Math.cos(code * 0.123) * 0.25;
      letters.push({
        ch,
        x: mouse.x || W / 2 + (Math.random() - 0.5) * 100,
        y: 60,
        vx: (Math.random() - 0.5) * 3,
        vy: 0,
        angle: (Math.random() - 0.5) * 0.5,
        va: (Math.random() - 0.5) * 0.05,
        buoy,            // >1 でよく浮く、<0.5 で沈みがち
        size: 24 + Math.random() * 16
      });
      if (letters.length > 120) letters.shift();
    }

    // ===== 入力 =====
    canvas.addEventListener('mousedown', e => { mouse.down = true; mouse.x = e.clientX; mouse.y = e.clientY; });
    addEventListener('mouseup', () => mouse.down = false);
    addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    // タッチ対応
    canvas.addEventListener('touchstart', e => { mouse.down = true; mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; e.preventDefault(); }, { passive: false });
    canvas.addEventListener('touchmove', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; e.preventDefault(); }, { passive: false });
    addEventListener('touchend', () => mouse.down = false);

    addEventListener('keydown', e => {
      if (e.key === 'Tab') { drainOpen = !drainOpen; e.preventDefault(); return; }
      if (e.key === ' ') { shake(); e.preventDefault(); return; }
      if (e.key === 'ArrowUp') { gravityFlip = !gravityFlip; return; }
      if (e.key === 'Delete' || e.key === 'Backspace') { particles = []; letters = []; return; }
      if (e.key.length === 1 && e.key !== ' ') spawnLetter(e.key);
    });

    function shake() {
      for (const p of particles) {
        if (p.mat === 'wall') continue;
        p.vx += (Math.random() - 0.5) * 14;
        p.vy -= Math.random() * 8;
      }
      for (const l of letters) {
        l.vx += (Math.random() - 0.5) * 10;
        l.vy -= Math.random() * 6;
        l.va += (Math.random() - 0.5) * 0.3;
      }
    }

    // ===== 流体シミュレーション（PBF風シンプル版） =====
    function simulate() {
      const g = gravityFlip ? -GRAVITY : GRAVITY;

      // マウス操作（注ぐ or かき混ぜる）
      if (mouse.down) {
        const mvx = mouse.x - mouse.px;
        const mvy = mouse.y - mouse.py;
        const speed = Math.hypot(mvx, mvy);
        if (currentMat === 'erase' || currentMat === 'wall' || speed < 4) {
          pour(mouse.x, mouse.y);   // 注ぐ／置く／消す（壁と消しゴムはドラッグ中も有効）
        } else {
          // 動いてる → かき混ぜる
          for (const p of particles) {
            if (p.mat === 'wall') continue;
            const dx = p.x - mouse.x, dy = p.y - mouse.y;
            const d = Math.hypot(dx, dy);
            if (d < 80) {
              const f = (1 - d / 80) * 0.4;
              p.vx += mvx * f;
              p.vy += mvy * f;
            }
          }
        }
      }
      mouse.px = mouse.x;
      mouse.py = mouse.y;

      // 重力 & 予測位置（素材ごとの重さ）
      for (const p of particles) {
        if (p.mat === 'wall') continue;
        p.vy += g * MATS[p.mat].gScale;
        p.px = p.x; p.py = p.y;
        p.x += p.vx;
        p.y += p.vy;
      }

      buildGrid();

      // 密度・圧力（ダブル密度緩和）
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        const nb = neighbors(p.x, p.y);
        let dens = 0, densNear = 0;
        const qs = [];
        for (const j of nb) {
          if (j === i) continue;
          const o = particles[j];
          const dx = o.x - p.x, dy = o.y - p.y;
          const d = Math.hypot(dx, dy);
          if (d < H_SMOOTH && d > 0.001) {
            const q = 1 - d / H_SMOOTH;
            dens += q * q;
            densNear += q * q * q;
            qs.push([j, dx / d, dy / d, q]);
          }
        }
        const press = STIFF * (dens - REST);
        const pressNear = STIFF_NEAR * densNear;
        const wp = MATS[p.mat].w;
        let dxAcc = 0, dyAcc = 0;
        for (const [j, nx, ny, q] of qs) {
          const o = particles[j];
          const wo = MATS[o.mat].w;
          const tot = wp + wo;
          if (tot === 0) continue;   // 壁同士は動かない
          // 押されやすさで分配（軽い油は押されやすく浮き上がる、壁は不動）
          const disp = press * q + pressNear * q * q;
          o.x += nx * disp * (wo / tot);
          o.y += ny * disp * (wo / tot);
          dxAcc -= nx * disp * (wp / tot);
          dyAcc -= ny * disp * (wp / tot);
          // 密度差バイアス：重い素材は沈み、軽い素材は浮く（砂↓ 油↑）
          if (wo > 0 && wp > 0) {
            const db = (MATS[p.mat].gScale - MATS[o.mat].gScale) * 0.06 * q * (gravityFlip ? -1 : 1);
            if (db !== 0) { dyAcc += db; o.y -= db; }
          }
        }
        p.x += dxAcc;
        p.y += dyAcc;
      }

      // 壁ブロックとのハード衝突（すり抜け防止）
      const wallMin = R * 1.5;
      for (const p of particles) {
        if (p.mat === 'wall') continue;
        const nb = neighbors(p.x, p.y);
        for (const j of nb) {
          const o = particles[j];
          if (o.mat !== 'wall') continue;
          const dx = p.x - o.x, dy = p.y - o.y;
          const d = Math.hypot(dx, dy);
          if (d < wallMin && d > 0.001) {
            // 壁の外側まで押し出す
            const push = (wallMin - d) / d;
            p.x += dx * push;
            p.y += dy * push;
          }
        }
      }

      // 壁 & 排水
      const drainX1 = W / 2 - 40, drainX2 = W / 2 + 40;
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        if (p.mat === 'wall') { p.vx = 0; p.vy = 0; continue; }
        if (p.x < R) { p.x = R; }
        if (p.x > W - R) { p.x = W - R; }
        if (p.y < R) { p.y = R; }
        if (p.y > H - R) {
          if (drainOpen && p.x > drainX1 && p.x < drainX2) {
            if (p.y > H + 30) { particles.splice(i, 1); continue; }
          } else {
            p.y = H - R;
          }
        }
        // 速度更新（位置ベース、素材ごとの粘性）
        const visc = MATS[p.mat].visc;
        p.vx = (p.x - p.px) * visc;
        p.vy = (p.y - p.py) * visc;
      }

      // ===== 文字の物理 =====
      for (let i = letters.length - 1; i >= 0; i--) {
        const l = letters[i];
        l.vy += g;

        // 水中判定：近傍の水パーティクル密度
        const nb = neighbors(l.x, l.y);
        let wet = 0, flowX = 0, flowY = 0;
        for (const j of nb) {
          const o = particles[j];
          const d = Math.hypot(o.x - l.x, o.y - l.y);
          if (o.mat === 'wall') {
            // 壁は文字を弾く
            if (d < l.size * 0.7 && d > 0.001) {
              const f = (1 - d / (l.size * 0.7)) * 1.5;
              l.vx += (l.x - o.x) / d * f;
              l.vy += (l.y - o.y) / d * f;
            }
            continue;
          }
          if (d < l.size) {
            wet++;
            flowX += o.vx;
            flowY += o.vy;
          }
        }
        if (wet > 0) {
          // 浮力（文字ごとの係数）＋水流に流される＋抵抗
          const submerge = Math.min(wet / 8, 1);
          l.vy -= g * l.buoy * 2.2 * submerge;
          l.vx += (flowX / wet - l.vx) * 0.06;
          l.vy += (flowY / wet - l.vy) * 0.04;
          l.vx *= 0.96;
          l.vy *= 0.96;
          l.va *= 0.97;
        }

        l.x += l.vx;
        l.y += l.vy;
        l.angle += l.va;

        // 壁
        const m = l.size / 2;
        if (l.x < m) { l.x = m; l.vx *= -0.5; }
        if (l.x > W - m) { l.x = W - m; l.vx *= -0.5; }
        if (l.y < m) { l.y = m; l.vy *= -0.3; }
        if (l.y > H - m) {
          if (drainOpen && l.x > drainX1 && l.x < drainX2) {
            if (l.y > H + 40) { letters.splice(i, 1); continue; }
          } else {
            l.y = H - m; l.vy *= -0.3; l.vx *= 0.9;
          }
        }
      }
    }

    // ===== 描画 =====
    function render() {
      ctx.clearRect(0, 0, W, H);

      // 流体（メタボール風グロー）
      ctx.globalCompositeOperation = 'lighter';
      for (const p of particles) {
        if (!MATS[p.mat].fluid) continue;
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, R * 2.5);
        grad.addColorStop(0, p.color + 'aa');
        grad.addColorStop(1, p.color + '00');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, R * 2.5, 0, 7);
        ctx.fill();
      }
      ctx.globalCompositeOperation = 'source-over';

      // 砂（不透明の粒）と壁（四角ブロック）
      for (const p of particles) {
        if (p.mat === 'sand') {
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, R * 0.8, 0, 7);
          ctx.fill();
        } else if (p.mat === 'wall') {
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x - R, p.y - R, R * 2, R * 2);
          ctx.strokeStyle = '#555';
          ctx.strokeRect(p.x - R, p.y - R, R * 2, R * 2);
        }
      }

      // 文字
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (const l of letters) {
        ctx.save();
        ctx.translate(l.x, l.y);
        ctx.rotate(l.angle);
        ctx.font = `bold ${l.size}px 'Segoe UI', sans-serif`;
        // 浮力で色味を変える（浮く=暖色、沈む=寒色）
        const hue = 200 - l.buoy * 120;
        ctx.fillStyle = `hsl(${hue}, 80%, 70%)`;
        ctx.fillText(l.ch, 0, 0);
        ctx.restore();
      }

      // 排水栓
      const drainX1 = W / 2 - 40, drainX2 = W / 2 + 40;
      ctx.fillStyle = drainOpen ? '#0f0f0f' : '#333';
      ctx.fillRect(drainX1, H - 6, 80, 6);
      ctx.strokeStyle = drainOpen ? '#4fc3f7' : '#555';
      ctx.strokeRect(drainX1, H - 6, 80, 6);

      // 統計
      document.getElementById('stats').textContent =
        `水: ${particles.length} / ${MAX_PARTICLES}　文字: ${letters.length}` +
        (drainOpen ? '　🕳️ 排水中' : '') +
        (gravityFlip ? '　🙃 重力反転' : '');
    }

    function loop() {
      simulate();
      render();
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
